<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
    <title>Settings</title>
  </head>
  <body>
    <div class="switch-container">
      <input type="checkbox" id="automatic-login" class="switch-input" />
      <label class="switch-label" for="automatic-login">Automatic Login</label>
    </div>

    <div class="switch-container">
      <input type="checkbox" id="login-fix" class="switch-input" />
      <label class="switch-label" for="login-fix">Optimize Login Page</label>
    </div>

    <div class="switch-container">
      <input type="checkbox" id="load-between-pages" class="switch-input" />
      <label class="switch-label" for="load-between-pages"
        >Loading Overlay</label
      >
    </div>

    <div class="switch-container">
      <input type="checkbox" id="wide-ui" class="switch-input" />
      <label class="switch-label" for="wide-ui">Wide Layout</label>
    </div>

    <div class="switch-container">
      <input type="checkbox" id="fix-favicon" class="switch-input" />
      <label class="switch-label" for="fix-favicon">Fix Empty Favicon</label>
    </div>

    <div class="switch-container">
      <input type="checkbox" id="old-assignment-center" class="switch-input" />
      <label class="switch-label" for="old-assignment-center"
        >Old Assignment Center</label
      >
    </div>

    <div class="switch-container">
      <input type="checkbox" id="copy-roster-tools" class="switch-input" />
      <label class="switch-label" for="copy-roster-tools">Roster Tools</label>
    </div>

    <div class="switch-container">
      <input type="checkbox" id="download-full-avatar" class="switch-input" />
      <label class="switch-label" for="download-full-avatar"
        >Download Full Avatar</label
      >
    </div>

    <div class="switch-container">
      <input
        type="checkbox"
        id="fix-broken-assignment-center"
        class="switch-input"
      />
      <label class="switch-label" for="fix-broken-assignment-center"
        >Fix Invalid Pages</label
      >
    </div>

    <em>Changes may require a refresh!</em>
    <script src="popup.js"></script>
  </body>
</html>
